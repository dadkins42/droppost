name: DropPost
options:
  bundleIdPrefix: com.droppost
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "4V26NGPWLA"

targets:
  DropPost:
    type: application
    platform: iOS
    sources:
      - DropPost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.droppost.DropPost
        INFOPLIST_FILE: DropPost/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: DropPost
    info:
      path: DropPost/Info.plist
      properties:
        CFBundleDisplayName: DropPost
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: "SystemBackground"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: "DropPost needs access to your photos to include them in blog posts."
        NSLocationWhenInUseUsageDescription: "DropPost can tag your posts with your current location."

  DropPost-macOS:
    type: application
    platform: macOS
    sources:
      - DropPost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.droppost.DropPost-macOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: DropPost
        CODE_SIGN_ENTITLEMENTS: DropPost/DropPost-macOS.entitlements
    info:
      path: DropPost/Info-macOS.plist
      properties:
        CFBundleDisplayName: DropPost
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPhotoLibraryUsageDescription: "DropPost needs access to your photos to include them in blog posts."
        NSLocationWhenInUseUsageDescription: "DropPost can tag your posts with your current location."
